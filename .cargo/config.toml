# Workstation-local LLVM install prefix (static build).
# inkwell / llvm-sys read LLVM_SYS_221_PREFIX at build time to find
# headers and static libs. Same install as sibling project NCL.
#
# Update the path if your LLVM install lives elsewhere.
[env]
LLVM_SYS_221_PREFIX = "C:\\projects\\LLVM\\install"

# Windows: increase main-thread stack to 16 MiB. Debug codegen frames
# can blow the default 1 MiB during recursive IR lowering.
[target.'cfg(target_os = "windows")']
rustflags = ["-C", "link-arg=/STACK:16777216"]
